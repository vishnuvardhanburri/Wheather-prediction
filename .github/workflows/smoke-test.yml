name: Smoke Test

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile Python
        run: python -m py_compile server.py backend/aiml/weather_engine.py backend/aiml/training_pipeline.py
      - name: Validate frontend JavaScript
        run: |
          node --check frontend/script.js
          node --check frontend/service-worker.js
      - name: Run smoke test
        run: python tests/smoke_test.py
