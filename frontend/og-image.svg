      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0d2235"/>
      <stop offset="1" stop-color="#087ea4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="920" cy="210" r="160" fill="none" stroke="#7dd3fc" stroke-opacity=".24" stroke-width="2"/>
